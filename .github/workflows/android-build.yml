name: Build SECU Debug

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Debug Java and Gradle
        run: |
          which java
          java -version 2>&1
          echo "---"
          cat gradle/wrapper/gradle-wrapper.properties
          echo "---"
          ls -la gradle/wrapper/
          echo "---"
          file gradle/wrapper/gradle-wrapper.jar

      - name: Run Gradle with verbose output
        run: |
          ./gradlew --no-daemon --version 2>&1 || true
          echo "=== VERSION DONE ==="
          ./gradlew --no-daemon assembleDebug --info 2>&1 || true
          echo "=== BUILD DONE ==="

      - name: Check APK
        run: |
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND"
          ls -la app/build/ 2>/dev/null || echo "NO BUILD DIR"
