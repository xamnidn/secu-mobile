name: Build SECU Debug

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Gradle wrapper
        run: |
          ./gradlew --version
          echo "---EXIT CODE: $?---"

      - name: Clean build
        run: |
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1
          echo "---EXIT CODE: $?---"

      - name: Verify build output
        run: |
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK"
          ls -la app/build/outputs/ 2>/dev/null || echo "NO outputs dir"
          ls -la app/build/ 2>/dev/null || echo "NO build dir"
