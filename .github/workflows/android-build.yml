name: Build SECU Debug

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Show environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          cat local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Find any APK produced
        run: |
          find / -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND ANYWHERE"

      - name: Show build directory structure
        run: |
          ls -la app/build/ 2>/dev/null || echo "NO build dir"
          ls -la app/build/outputs/ 2>/dev/null || echo "NO outputs dir"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "NO apk dir"

      - name: Upload any APK found
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/*.apk"
